  </g>
  
  <g transform="translate(30, 125)">
    <circle cx="6" cy="6" r="6" fill="#e34c26" />
    <text class="text" x="20" y="11">HTML 15%</text>
    <rect x="150" y="3" width="35" height="8" rx="4" fill="#e34c26" />
  </g>
  
  <g transform="translate(30, 155)">
    <circle cx="6" cy="6" r="6" fill="#f1e05a" />
    <text class="text" x="20" y="11">JavaScript 8%</text>
