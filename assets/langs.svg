<svg width="300" height="195" viewBox="0 0 300 195" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg {{ fill: transparent; stroke: #2563EB; stroke-width: 1; rx: 8; }}
      .title {{ font-family: 'Segoe UI', Ubuntu, sans-serif; font-size: 18px; font-weight: bold; fill: #2563EB; }}
      .text {{ font-family: 'Segoe UI', Ubuntu, sans-serif; font-size: 14px; font-weight: 500; fill: #777777; }}
    </style>
  </defs>
  <rect class="bg" x="1" y="1" width="298" height="193" />
  <text class="title" x="30" y="35">Most Used Languages</text>
  
  <g transform="translate(30, 65)">
